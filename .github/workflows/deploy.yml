name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Pin tool versions. wasm-bindgen MUST match the wasm-bindgen crate version
# in Cargo.lock; bump both together.
env:
  WASM_BINDGEN_VERSION: "0.2.122"
  TAILWIND_VERSION: "v4.3.0"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: |
          set -euo pipefail
          url="https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -sSL "$url" | tar xz -C /tmp
          sudo install "/tmp/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl/wasm-bindgen" /usr/local/bin/

      - name: Install Tailwind CSS
        run: |
          set -euo pipefail
          url="https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64"
          sudo curl -sSL -o /usr/local/bin/tailwindcss "$url"
          sudo chmod +x /usr/local/bin/tailwindcss

      - name: Build static site
        run: make build

      - name: Validate build
        run: make validate

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          # wrangler >= 4 parses _headers/_redirects for Workers static assets;
          # the action's bundled default (3.90) uploads them as plain files instead.
          wranglerVersion: "4.98.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
